<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ember Radar Strip</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090604;
        --panel: #1f1208;
        --accent: #ff6b35;
        --muted: #f59e0b;
        --accent-rgb: 255, 107, 53;
        --muted-rgb: 245, 158, 11;
        --intensity: 0.64;
        --ember-scale: 1;
        --ember-opacity: 1;
        --band-opacity: 0.72;
        --glow-opacity: 0.72;
        --particle-opacity: 0.64;
        --sweep-opacity: 0.62;
        --pulse-speed: 3.4s;
        --sweep-speed: 5.4s;
        --scan-speed: 4.8s;
        --beam-speed: 4.2s;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        font-family: system-ui, sans-serif;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 18px;
        background:
          radial-gradient(circle at 58% 48%, rgba(255, 255, 255, 0.05), transparent 36%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0) 18%, rgba(var(--accent-rgb), 0.08) 52%, rgba(0, 0, 0, 0.28)),
          linear-gradient(135deg, #0b0503, var(--panel) 48%, rgba(var(--accent-rgb), 0.24));
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: -10% -20%;
        pointer-events: none;
        background:
          linear-gradient(90deg, transparent 0%, rgba(var(--accent-rgb), 0.12) 34%, rgba(255, 236, 213, 0.22) 50%, rgba(var(--accent-rgb), 0.1) 62%, transparent 100%);
        mix-blend-mode: screen;
        opacity: calc(0.12 + var(--intensity) * 0.7);
        transform: translateX(-34%);
        animation: beam var(--beam-speed) ease-in-out infinite;
      }

      .frame::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0) 34%, rgba(0, 0, 0, 0.26)),
          radial-gradient(circle at center, rgba(0, 0, 0, 0) 30%, rgba(0, 0, 0, 0.18) 100%);
      }

      .grid,
      .scanline,
      .flare,
      .scene {
        position: absolute;
        inset: 0;
      }

      .grid {
        opacity: 0.42;
        background:
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent calc(12.5% - 1px),
            rgba(255, 255, 255, 0.07) calc(12.5% - 1px),
            rgba(255, 255, 255, 0.07) 12.5%
          ),
          repeating-linear-gradient(
            180deg,
            transparent 0,
            transparent 23px,
            rgba(255, 255, 255, 0.06) 24px
          );
      }

      .scanline {
        background: linear-gradient(90deg, transparent, rgba(255, 243, 230, 0.34), rgba(var(--accent-rgb), 0.62), rgba(255, 243, 230, 0.28), transparent);
        mix-blend-mode: screen;
        opacity: var(--sweep-opacity);
        transform: translateX(-130%);
        animation: slide var(--scan-speed) linear infinite;
      }

      .flare {
        inset: auto auto 50% 12%;
        width: 132px;
        height: 132px;
        transform: translate(-50%, 50%) scale(var(--ember-scale));
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 250, 231, 0.96) 0, rgba(255, 201, 117, 0.86) 18%, rgba(var(--accent-rgb), 0.52) 42%, transparent 74%);
        filter: blur(18px);
        opacity: var(--glow-opacity);
        animation: breathe 2.8s ease-in-out infinite;
      }

      .scene {
        width: 100%;
        height: 100%;
      }

      .ring,
      .pulse {
        fill: none;
        stroke: rgba(255, 255, 255, 0.14);
        vector-effect: non-scaling-stroke;
      }

      .ring {
        stroke: rgba(255, 190, 140, 0.24);
        stroke-width: 1.8;
      }

      .pulse {
        stroke: rgba(var(--accent-rgb), 0.58);
        stroke-width: 2;
      }

      .pulse-a {
        animation: pulse var(--pulse-speed) ease-out infinite;
      }

      .pulse-b {
        animation: pulse var(--pulse-speed) ease-out 1.7s infinite;
      }

      .core {
        fill: rgba(255, 255, 255, 0.92);
        filter: url(#soft-glow);
      }

      .core-halo {
        fill: rgba(var(--accent-rgb), 0.72);
        filter: url(#soft-glow);
      }

      .sweep-arm {
        transform-origin: 110px 60px;
        animation: sweep var(--sweep-speed) linear infinite;
      }

      .sweep {
        stroke: url(#sweep-gradient);
        stroke-width: 4.5;
        stroke-linecap: round;
        fill: none;
        opacity: var(--sweep-opacity);
        filter: url(#sweep-glow);
      }

      .track,
      .track-glow {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .track {
        stroke: rgba(255, 255, 255, 0.28);
        stroke-width: 1.8;
        stroke-dasharray: 7 10;
        animation: drift 8s linear infinite;
      }

      .track-glow {
        stroke: rgba(var(--accent-rgb), calc(0.14 + var(--intensity) * 0.48));
        stroke-width: 3.8;
        stroke-dasharray: 18 18;
        filter: url(#soft-glow);
        animation: drift 3.2s linear infinite reverse;
      }

      .ambient-rings {
        opacity: 0.66;
      }

      .ambient-rings .ring {
        stroke: rgba(255, 161, 89, 0.2);
      }

      .ambient-rings .pulse {
        stroke: rgba(var(--accent-rgb), 0.26);
      }

      .ambient-rings .pulse-a,
      .ambient-rings .pulse-b {
        animation-duration: 4.6s;
      }

      .ambient-core {
        fill: rgba(255, 209, 150, 0.5);
        filter: url(#soft-glow);
      }

      .ember-cluster {
        transform-origin: 116px 94px;
        transform: scale(var(--ember-scale));
        opacity: var(--ember-opacity);
      }

      .flame-group {
        transform-origin: 116px 98px;
        animation: flame-flicker 2.2s ease-in-out infinite;
      }

      .flame-back,
      .flame-mid,
      .flame-core-shape {
        filter: url(#soft-glow);
        transform-origin: 116px 98px;
      }

      .flame-back {
        fill: rgba(var(--accent-rgb), 0.46);
        animation: flame-sway 3.1s ease-in-out infinite;
      }

      .flame-mid {
        fill: rgba(255, 178, 84, 0.82);
        animation: flame-sway 2.4s ease-in-out -0.6s infinite;
      }

      .flame-core-shape {
        fill: rgba(255, 246, 222, 0.96);
        animation: flame-sway 1.9s ease-in-out -1s infinite;
      }

      .flame-spark {
        fill: rgba(255, 211, 144, 0.94);
        filter: url(#soft-glow);
        animation: ember-rise var(--speed, 3.4s) ease-in infinite;
        animation-delay: var(--delay, 0s);
      }

      .flame-spark.dim {
        fill: rgba(var(--accent-rgb), 0.76);
      }

      .particle {
        fill: rgba(255, 248, 240, 1);
        filter: url(#soft-glow);
        animation: twinkle var(--speed, 2.4s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
        opacity: var(--particle-opacity);
      }

      .particle.echo {
        fill: rgba(var(--muted-rgb), 0.88);
      }

      .heat-band {
        fill: url(#heat-band);
        opacity: calc(var(--band-opacity) * (0.32 + var(--intensity) * 0.4));
        animation: hum 3s ease-in-out infinite;
      }

      .heat-band.alt {
        opacity: calc(0.28 + var(--intensity) * 0.16);
        animation-delay: -1.5s;
      }

      body.score-zero .ember-cluster {
        opacity: 0.16;
        transform: scale(0.2);
      }

      body.score-zero .flame-group,
      body.score-zero .flame-spark,
      body.score-zero .particle {
        opacity: 0;
      }

      body.score-zero .flare {
        opacity: 0.08;
      }

      body.score-zero .heat-band,
      body.score-zero .heat-band.alt {
        opacity: 0.08;
      }

      body.level-warming {
        --muted-rgb: 250, 204, 21;
      }

      body.level-hot {
        --muted-rgb: 251, 146, 60;
      }

      body.level-ember {
        --muted-rgb: 239, 68, 68;
      }

      @keyframes sweep {
        from {
          transform: rotate(-10deg);
        }
        to {
          transform: rotate(350deg);
        }
      }

      @keyframes pulse {
        0% {
          opacity: 0;
          transform: scale(0.9);
        }
        18% {
          opacity: 0.8;
        }
        100% {
          opacity: 0;
          transform: scale(1.18);
        }
      }

      @keyframes drift {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: -180;
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.22;
          transform: scale(0.92);
        }
        50% {
          opacity: 0.95;
          transform: scale(1.18);
        }
      }

      @keyframes slide {
        from {
          transform: translateX(-130%);
        }
        to {
          transform: translateX(130%);
        }
      }

      @keyframes beam {
        0%,
        100% {
          transform: translateX(-34%);
          opacity: 0.42;
        }
        50% {
          transform: translateX(18%);
          opacity: 1;
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: translate(-50%, 50%) scale(calc(var(--ember-scale) * 0.96));
        }
        50% {
          transform: translate(-50%, 50%) scale(calc(var(--ember-scale) * 1.08));
        }
      }

      @keyframes hum {
        0%,
        100% {
          opacity: 0.34;
        }
        50% {
          opacity: 0.88;
        }
      }

      @keyframes flame-flicker {
        0%,
        100% {
          transform: translateY(0) scale(1, 1);
        }
        25% {
          transform: translateY(-1px) scale(1.02, 1.05);
        }
        55% {
          transform: translateY(1px) scale(0.98, 0.97);
        }
        75% {
          transform: translateY(-2px) scale(1.03, 1.08);
        }
      }

      @keyframes flame-sway {
        0%,
        100% {
          transform: skewX(-2deg) scaleY(1);
        }
        50% {
          transform: skewX(2deg) scaleY(1.06);
        }
      }

      @keyframes ember-rise {
        0% {
          opacity: 0;
          transform: translate(0, 10px) scale(0.7);
        }
        18% {
          opacity: 0.95;
        }
        100% {
          opacity: 0;
          transform: translate(var(--drift, 8px), -34px) scale(1.05);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .frame::before,
        .scanline,
        .flare,
        .pulse-a,
        .pulse-b,
        .sweep-arm,
        .track,
        .track-glow,
        .particle,
        .heat-band,
        .ambient-rings,
        .ember-cluster,
        .flame-group,
        .flame-back,
        .flame-mid,
        .flame-core-shape,
        .flame-spark {
          animation: none !important;
        }

        .scanline {
          opacity: 0;
        }

        .sweep-arm {
          transform: rotate(22deg);
        }

        .pulse {
          opacity: 0.28;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame" aria-hidden="true">
      <div class="grid"></div>
      <div class="scanline"></div>
      <div class="flare"></div>

      <svg class="scene" viewBox="0 0 800 160" preserveAspectRatio="none">
        <defs>
          <linearGradient id="heat-band" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
            <stop offset="14%" stop-color="#ffffff" stop-opacity="0.06" />
            <stop offset="36%" stop-color="#ffb74d" stop-opacity="0.24" />
            <stop offset="56%" stop-color="#ff6b35" stop-opacity="0.46" />
            <stop offset="82%" stop-color="#ffb74d" stop-opacity="0.18" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
          </linearGradient>
          <linearGradient id="sweep-gradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
            <stop offset="18%" stop-color="#ffffff" stop-opacity="0.52" />
            <stop offset="58%" stop-color="#ffffff" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
          </linearGradient>
          <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3.2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <filter id="sweep-glow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <g class="ambient-rings">
          <circle class="ring" cx="116" cy="94" r="28"></circle>
          <circle class="ring" cx="116" cy="94" r="48"></circle>
          <circle class="ring" cx="116" cy="94" r="70"></circle>
          <circle class="pulse pulse-a" cx="116" cy="94" r="34"></circle>
          <circle class="pulse pulse-b" cx="116" cy="94" r="58"></circle>
          <circle class="ambient-core" cx="116" cy="94" r="3.5"></circle>
        </g>

        <g class="ember-cluster">
          <g>
          <circle class="core-halo" cx="116" cy="94" r="14"></circle>
          <circle class="core" cx="116" cy="94" r="4"></circle>
          </g>

          <g class="flame-group">
            <path
              class="flame-back"
              d="M116 132 C95 126 82 107 86 86 C90 66 106 52 114 28 C122 49 145 63 149 87 C153 107 141 126 116 132 Z"
            ></path>
            <path
              class="flame-mid"
              d="M116 126 C101 121 94 105 97 90 C99 77 110 66 115 47 C121 63 135 75 137 92 C139 107 131 120 116 126 Z"
            ></path>
            <path
              class="flame-core-shape"
              d="M116 118 C107 114 104 103 105 93 C107 84 113 76 116 63 C120 75 126 83 127 94 C128 105 123 114 116 118 Z"
            ></path>
            <circle class="flame-spark" cx="144" cy="62" r="2.2" style="--delay: -0.2s; --speed: 2.6s; --drift: 10px;"></circle>
            <circle class="flame-spark dim" cx="132" cy="52" r="1.8" style="--delay: -1.4s; --speed: 3.2s; --drift: 16px;"></circle>
            <circle class="flame-spark" cx="160" cy="76" r="2" style="--delay: -0.9s; --speed: 2.9s; --drift: 8px;"></circle>
          </g>
        </g>

        <g class="sweep-arm">
          <path class="sweep" d="M 116 94 L 772 94"></path>
        </g>

        <rect class="heat-band" x="192" y="80" width="556" height="10" rx="5"></rect>
        <rect class="heat-band alt" x="244" y="106" width="446" height="7" rx="3.5"></rect>

        <path
          class="track"
          d="M 156 114 C 224 90, 302 124, 384 90 S 550 108, 640 86 S 732 108, 792 82"
        ></path>
        <path
          class="track-glow"
          d="M 156 114 C 224 90, 302 124, 384 90 S 550 108, 640 86 S 732 108, 792 82"
        ></path>

        <g>
          <circle class="particle" cx="232" cy="58" r="2.2" style="--delay: -0.2s; --speed: 2.8s;"></circle>
          <circle class="particle echo" cx="302" cy="112" r="2" style="--delay: -1.2s; --speed: 3.6s;"></circle>
          <circle class="particle" cx="378" cy="48" r="2.4" style="--delay: -2.1s; --speed: 3.1s;"></circle>
          <circle class="particle echo" cx="472" cy="118" r="2.2" style="--delay: -0.8s; --speed: 3.8s;"></circle>
          <circle class="particle" cx="556" cy="60" r="2.3" style="--delay: -2.7s; --speed: 3.4s;"></circle>
          <circle class="particle echo" cx="646" cy="104" r="2" style="--delay: -1.8s; --speed: 2.9s;"></circle>
          <circle class="particle" cx="730" cy="46" r="2.5" style="--delay: -0.5s; --speed: 3.3s;"></circle>
        </g>
      </svg>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var root = document.documentElement;
        var body = document.body;

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function normalizeHex(value, fallback) {
          var source = (value || fallback || "").replace(/[^0-9a-fA-F]/g, "");
          if (source.length === 3 || source.length === 4) {
            source = source
              .slice(0, 3)
              .split("")
              .map(function (char) {
                return char + char;
              })
              .join("");
          }
          if (source.length < 6) return fallback;
          return source.slice(0, 6);
        }

        function hexToRgb(hex) {
          return [
            parseInt(hex.slice(0, 2), 16),
            parseInt(hex.slice(2, 4), 16),
            parseInt(hex.slice(4, 6), 16),
          ].join(", ");
        }

        var score = clamp(Number(params.get("score") || params.get("heat") || 0), 0, 100);
        var intensity = score / 100;
        var level = (params.get("level") || "cool").replace(/[^a-z]/gi, "").toLowerCase() || "cool";
        var accent = normalizeHex(params.get("accent"), "ff6b35");
        var muted = normalizeHex(params.get("muted"), "f59e0b");
        var panel = normalizeHex(params.get("panel"), "1f1208");
        var bg = normalizeHex(params.get("bg"), "090604");

        body.classList.add("level-" + level);
        if (score === 0) body.classList.add("score-zero");

        root.style.setProperty("--accent", "#" + accent);
        root.style.setProperty("--muted", "#" + muted);
        root.style.setProperty("--panel", "#" + panel);
        root.style.setProperty("--bg", "#" + bg);
        root.style.setProperty("--accent-rgb", hexToRgb(accent));
        root.style.setProperty("--muted-rgb", hexToRgb(muted));
        root.style.setProperty("--intensity", intensity.toFixed(3));
        root.style.setProperty("--ember-scale", (0.18 + intensity * 1.08).toFixed(3));
        root.style.setProperty("--ember-opacity", (0.16 + intensity * 0.84).toFixed(3));
        root.style.setProperty("--glow-opacity", (0.08 + intensity * 0.77).toFixed(3));
        root.style.setProperty("--particle-opacity", (0.04 + intensity * 0.86).toFixed(3));
        root.style.setProperty("--sweep-opacity", (0.12 + intensity * 0.66).toFixed(3));
        root.style.setProperty("--band-opacity", (0.18 + intensity * 0.72).toFixed(3));
        root.style.setProperty("--pulse-speed", (4.2 - intensity * 2.1).toFixed(2) + "s");
        root.style.setProperty("--sweep-speed", (7.2 - intensity * 3.4).toFixed(2) + "s");
        root.style.setProperty("--scan-speed", (6.2 - intensity * 2.7).toFixed(2) + "s");
        root.style.setProperty("--beam-speed", (5.4 - intensity * 2.1).toFixed(2) + "s");
      })();
    </script>
  </body>
</html>
